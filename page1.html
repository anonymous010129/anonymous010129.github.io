<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page 1 - VGGSound-ConRet Dataset Check</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .embed-main {
      width: min(var(--page-width), calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .embed-frame-wrap {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .embed-frame {
      display: block;
      width: 100%;
      height: calc(100vh - 118px);
      min-height: 920px;
      border: 0;
      background: #ffffff;
    }

    @media (max-width: 760px) {
      .embed-frame {
        height: calc(100vh - 146px);
        min-height: 760px;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand-link" href="index.html">ConRet Demo page</a>
        <nav class="site-nav" aria-label="Page navigation">
          <a href="index.html">Main</a>
          <a class="is-active" href="page1.html">Page 1</a>
          <a href="page2.html">Page 2</a>
          <a href="page3.html">Page 3</a>
        </nav>
      </div>
    </header>

    <main class="embed-main">
      <div class="embed-frame-wrap">
        <iframe
          class="embed-frame"
          src="web_demo_selected/index.html"
          title="Page 1 selected examples"
        ></iframe>
      </div>
    </main>
  </div>
</body>
</html>
